  <circle cx="480" cy="295" r="8" fill="#22c55e" />
  <text x="495" y="298" font-family="Arial, sans-serif" font-size="10" fill="#334155">Keywords optimized</text>
  <circle cx="480" cy="320" r="8" fill="#22c55e" />
