  <text x="60" y="150" font-family="Arial, sans-serif" font-size="10" fill="#64748b">alex.johnson@email.com • San Francisco, CA</text>
  
  <text x="60" y="180" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#94a3b8">EXPERIENCE</text>
  <rect x="60" y="190" width="360" height="8" rx="4" fill="#e2e8f0" />
  <rect x="60" y="205" width="320" height="8" rx="4" fill="#e2e8f0" />
  <rect x="60" y="220" width="340" height="8" rx="4" fill="#e2e8f0" />
  
  <text x="60" y="260" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#94a3b8">SKILLS</text>
