  <text x="480" y="430" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#5b21b6">JOB MATCH</text>
  <text x="480" y="460" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#7c3aed">88%</text>
  <text x="480" y="480" font-family="Arial, sans-serif" font-size="10" fill="#334155">Matching: Senior Dev at Google</text>
  
  <!-- Watermark -->
  <text x="400" y="580" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Replace with your premium screenshot: hero-screenshot.png</text>
