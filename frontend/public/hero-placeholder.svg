  <text x="225" y="284" font-family="Arial, sans-serif" font-size="9" fill="#16a34a">AWS</text>
  
  <!-- ATS Score Card -->
  <rect x="460" y="80" width="300" height="140" rx="8" fill="url(#cardBg)" stroke="#bbf7d0" stroke-width="2" />
  <text x="480" y="110" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">ATS SCORE</text>
